# Flutter 3.16+, pub.dev metadata
name: app_snackbar
description: >-
  Beautiful, customizable Flutter SnackBar with 4 types, animations, queue,
    timer bar, action buttons, loading states, and Material 3 support.
version: 1.0.3
homepage: https://github.com/spatelpatidar/app_snackbar
repository: https://github.com/spatelpatidar/app_snackbar
issue_tracker: https://github.com/spatelpatidar/app_snackbar/issues

topics:
  - snackbar
  - ui
  - notification
  - material
  - overlay

screenshots:
  - description: 'Main Showcase: All SnackBar types and styles'
    path: screenshots/showcase.png
  - description: 'Error State: Premium error notification style'
    path: screenshots/error.png
  - description: 'Top Position: Dynamic positioning at the top'
    path: screenshots/top_position.png
  - description: 'Custom Code: Real-time code preview and editor'
    path: screenshots/code_preview.png

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true